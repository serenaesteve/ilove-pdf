<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}s.pdf — Herramientas PDF{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo">s.pdf</a>
    <div class="nav-tools">
      <a href="/tool/merge">Unir</a>
      <a href="/tool/split">Dividir</a>
      <a href="/tool/compress">Comprimir</a>
      <a href="/tool/protect">Proteger</a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>s.pdf · Todas tus herramientas PDF en un solo lugar 🩷</p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
